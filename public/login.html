<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento Diverxia - Inicio</title>
    <link rel="icon" href="img/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-geometry">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <header>
        <div class="logo">
            <a href="index.html"><img src="img/Recurso-1.svg" alt="Diverxia Logo"></a>
        </div>
        <div class="hamburger" id="hamburger-header">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="hamburger active" id="hamburger-sidebar">
                <span></span><span></span><span></span>
            </div>
        </div>
        <a href="index.html">Inicio</a>
        <a href="roles.html">Comenzar</a>
        <a href="invitados.html" class="nav-invitados" style="display: none;">Panel Invitados</a>
        <a href="admin.html" class="nav-admin" style="display: none;">Panel Administrador</a>
        <a href="jueces.html" class="nav-jueces" style="display: none;">Panel Jueces</a>
        <a href="https://www.diverxiaconsulting.com" target="_blank">Sobre Nosotros</a>
        <a href="#" class="nav-logout" style="display: none;">Cerrar sesión</a>
    </nav>

    <main>
        <div class="container login-container" style="max-width: 450px;">
            <h1>Iniciar <span>Sesión</span></h1>
            <p class="subtitle">Inicia sesión de forma segura para comenzar.</p>
            <form id="dummy-login-form" class="auth-form" onsubmit="event.preventDefault(); window.location.href='admin.html'; localStorage.setItem('role', 'admin');">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@diverxia.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres, mayúscula, minúscula y símbolo" 
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+{}:;&lt;&gt;?~-]).{8,}"
                           title="Debe contener al menos 8 caracteres, al menos un número, una mayúscula, una minúscula y un símbolo especial." required>
                </div>
                <button type="submit" class="btn">Ingresar al Panel</button>
            </form>
        </div>
    </main>

    <footer>
        © 2026 Diverxia Consulting
    </footer>

    <script src="script.js"></script>
</body>
</html>
