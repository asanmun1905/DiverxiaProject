<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Diverxia</title>
    <link rel="icon" href="img/Favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Events page specific styles ── */
        .events-wrapper {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .events-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .events-header h1 {
            margin-bottom: 0;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--light);
            padding: 9px 18px;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn:hover {
            background: rgba(49, 183, 219, 0.15);
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--dark);
        }

        .filter-btn .arrow {
            font-size: 0.75rem;
            line-height: 1;
        }

        /* Event list */
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            padding-right: 6px;
            -webkit-overflow-scrolling: touch; /* Smoother scrolling on iOS */
            overscroll-behavior-y: contain; /* Prevents body scrolling when reaching the end */
        }

        /* Scrollbar styling */
        .events-list::-webkit-scrollbar {
            width: 6px;
        }
        .events-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .events-list::-webkit-scrollbar-thumb {
            background: rgba(49, 183, 219, 0.35);
            border-radius: 10px;
        }
        .events-list::-webkit-scrollbar-thumb:hover {
            background: rgba(49, 183, 219, 0.6);
        }

        /* Single event card */
        .event-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            padding: 22px 30px;
            transition: all 0.3s;
            gap: 20px;
            cursor: pointer;
        }

        .event-card:hover {
            background: rgba(49, 183, 219, 0.08);
            border-color: rgba(49, 183, 219, 0.35);
            transform: translateX(4px);
        }

        .event-card.past {
            opacity: 0.42;
            filter: saturate(0.3);
        }

        .event-card.past:hover {
            opacity: 0.6;
            filter: saturate(0.5);
        }

        .event-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .event-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--light);
            line-height: 1.3;
        }

        .event-category {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .event-dates {
            text-align: right;
            flex-shrink: 0;
        }

        .event-date-range {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--light);
            white-space: nowrap;
        }

        .event-date-range .date-sep {
            color: rgba(235,235,235,0.4);
            margin: 0 6px;
        }

        .event-status {
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 5px;
            text-align: right;
        }

        .event-status.active-status {
            color: #4ade80;
        }

        .event-status.upcoming-status {
            color: var(--primary);
        }

        .event-status.past-status {
            color: rgba(235,235,235,0.4);
        }

        .no-results {
            text-align: center;
            color: rgba(235,235,235,0.4);
            padding: 60px 0;
            font-size: 1.1rem;
        }

        /* ── Responsive adjustments for events ── */
        @media (max-width: 640px) {
            .events-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .filter-bar {
                width: 100%;
                justify-content: flex-start;
            }

            .filter-btn {
                padding: 7px 14px;
                font-size: 0.85rem;
                flex-grow: 1;
                justify-content: center;
            }

            .event-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 18px 20px;
                gap: 12px;
            }

            .event-dates {
                text-align: left;
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-top: 1px solid rgba(255,255,255,0.05);
                padding-top: 10px;
            }
            
            .event-status {
                margin-top: 0;
            }
            
            .events-list {
                max-height: calc(100vh - 320px);
            }
        }
    </style>
</head>
<body>
    <div class="bg-geometry">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <header>
        <div class="logo">
            <a href="index.html"><img src="img/Recurso-1.svg" alt="Diverxia Logo"></a>
        </div>
        <div class="hamburger" id="hamburger-header">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="hamburger active" id="hamburger-sidebar">
                <span></span><span></span><span></span>
            </div>
        </div>
        <a href="index.html">Inicio</a>
        <a href="roles.html">Comenzar</a>
        <a href="invitados.html" class="nav-invitados" style="display: none;">Panel Invitados</a>
        <a href="admin.html" class="nav-admin" style="display: none;">Panel Administrador</a>
        <a href="jueces.html" class="nav-jueces" style="display: none;">Panel Jueces</a>
        <a href="https://www.diverxiaconsulting.com" target="_blank">Sobre Nosotros</a>
        <a href="#" class="nav-logout" style="display: none;">Cerrar sesión</a>
    </nav>

    <main style="align-items: center; justify-content: flex-start; padding-top: 30px;">
        <div class="events-wrapper">
            <div class="events-header">
                <div>
                    <h1>Listado de <span>Eventos</span></h1>
                    <p class="subtitle" style="margin-bottom: 0; margin-top: 8px;">Explora todas las pruebas del evento.</p>
                </div>
                <div class="filter-bar">
                    <button class="filter-btn" data-sort="date-asc" id="btn-date-asc">
                        Fecha <span class="arrow">↑</span>
                    </button>
                    <button class="filter-btn active" data-sort="date-desc" id="btn-date-desc">
                        Fecha <span class="arrow">↓</span>
                    </button>
                    <button class="filter-btn" data-sort="name-asc" id="btn-name-asc">
                        Nombre <span class="arrow">↑</span>
                    </button>
                    <button class="filter-btn" data-sort="name-desc" id="btn-name-desc">
                        Nombre <span class="arrow">↓</span>
                    </button>
                </div>
            </div>

            <div class="events-list" id="events-list">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <footer>
        © 2026 Diverxia Consulting
    </footer>

    <script src="script.js"></script>
    <script>
        // ── Event data (placeholder) ──────────────────────────────────────────────
        const events = [
            {
                title: "Prueba de Liderazgo",
                category: "Habilidades Blandas",
                start: "2026-05-10",
                end: "2026-05-12"
            },
            {
                title: "Reto de Innovación Empresarial",
                category: "Competición",
                start: "2026-04-20",
                end: "2026-04-21"
            },
            {
                title: "Taller de Comunicación Efectiva",
                category: "Formación",
                start: "2026-03-15",
                end: "2026-03-15"
            },
            {
                title: "Hackathon Diverxia 2026",
                category: "Tecnología",
                start: "2026-06-01",
                end: "2026-06-03"
            },
            {
                title: "Gymkhana de Equipos",
                category: "Dinámicas de Grupo",
                start: "2026-02-28",
                end: "2026-03-01"
            },
            {
                title: "Simulación de Negociación",
                category: "Competición",
                start: "2026-07-14",
                end: "2026-07-14"
            },
            {
                title: "Evaluación de Resolución de Conflictos",
                category: "Habilidades Blandas",
                start: "2026-01-20",
                end: "2026-01-22"
            },
            {
                title: "Prueba de Creatividad Visual",
                category: "Diseño",
                start: "2026-08-05",
                end: "2026-08-06"
            },
            {
                title: "Presentaciones ante Jurado",
                category: "Competición",
                start: "2026-04-08",
                end: "2026-04-09"
            },
            {
                title: "Escape Room Empresarial",
                category: "Dinámicas de Grupo",
                start: "2026-03-03",
                end: "2026-03-03"
            }
        ];

        // ── Helpers ───────────────────────────────────────────────────────────────
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        function parseDate(str) {
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        function formatDate(str) {
            const d = parseDate(str);
            return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function getStatus(start, end) {
            const s = parseDate(start);
            const e = parseDate(end);
            if (e < today) return 'past';
            if (s <= today && e >= today) return 'active';
            return 'upcoming';
        }

        function statusLabel(status) {
            if (status === 'past')     return { label: 'Finalizado', cls: 'past-status' };
            if (status === 'active')   return { label: '● En curso', cls: 'active-status' };
            return { label: 'Próximo', cls: 'upcoming-status' };
        }

        // ── Render ────────────────────────────────────────────────────────────────
        let currentSort = 'date-desc';

        function renderEvents() {
            const list = document.getElementById('events-list');
            const sorted = [...events].sort((a, b) => {
                if (currentSort === 'date-asc')  return parseDate(a.start) - parseDate(b.start);
                if (currentSort === 'date-desc') return parseDate(b.start) - parseDate(a.start);
                if (currentSort === 'name-asc')  return a.title.localeCompare(b.title, 'es');
                if (currentSort === 'name-desc') return b.title.localeCompare(a.title, 'es');
                return 0;
            });

            list.innerHTML = '';

            if (sorted.length === 0) {
                list.innerHTML = '<div class="no-results">No hay eventos disponibles.</div>';
                return;
            }

            sorted.forEach(ev => {
                const status = getStatus(ev.start, ev.end);
                const sl = statusLabel(status);
                const sameDay = ev.start === ev.end;
                const dateRange = sameDay
                    ? formatDate(ev.start)
                    : `${formatDate(ev.start)}<span class="date-sep">→</span>${formatDate(ev.end)}`;

                const card = document.createElement('div');
                card.className = `event-card${status === 'past' ? ' past' : ''}`;
                card.innerHTML = `
                    <div class="event-info">
                        <div class="event-title">${ev.title}</div>
                        <div class="event-category">${ev.category}</div>
                    </div>
                    <div class="event-dates">
                        <div class="event-date-range">${dateRange}</div>
                        <div class="event-status ${sl.cls}">${sl.label}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // ── Sort Buttons ──────────────────────────────────────────────────────────
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentSort = btn.dataset.sort;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderEvents();
            });
        });

        renderEvents();
    </script>
</body>
</html>
